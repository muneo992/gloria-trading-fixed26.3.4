name: Deploy main to Sakura Test (gloria-test)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to deploy"
        required: true
        default: "YES"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SAKURA_PORT || '22' }}" -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --exclude='.git*' --exclude='.github' --exclude='admin/.htpasswd' --exclude='admin/password.txt' -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SAKURA_PORT || '22' }} -o StrictHostKeyChecking=no" ./ ${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:${{ secrets.SAKURA_TEST_PATH }}/

      - name: Publish root symlinks for Sakura
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SAKURA_PORT || '22' }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "bash '${{ secrets.SAKURA_TEST_PATH }}/scripts/sakura-publish-links.sh' '${{ secrets.SAKURA_TEST_PATH }}'"

      - name: Smoke test gloria-test site
        run: |
          set -e
          sleep 3
          curl -I --fail --max-time 20 "https://gltr.sakura.ne.jp/gloria-test/"
          curl -I --fail --max-time 20 "https://gltr.sakura.ne.jp/gloria-test/catalog.html"
          curl -s --fail --max-time 20 "https://gltr.sakura.ne.jp/gloria-test/admin/index.php?diag=1" | grep -q "status: ok"
