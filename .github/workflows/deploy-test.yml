name: Deploy to Sakura Test Environment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to deploy"
        required: true
        default: "YES"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SAKURA_PORT || '22' }}" -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --exclude='.git*' --exclude='.github' -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SAKURA_PORT || '22' }} -o StrictHostKeyChecking=no" ./ ${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:${{ secrets.SAKURA_TEST_PATH }}/

