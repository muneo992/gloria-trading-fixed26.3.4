name: Deploy main to Sakura production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY_PRODUCTION to deploy main to www.gloriatrading.com"
        required: true
        type: string

concurrency:
  group: sakura-gloria-production-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Sakura production with backup
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'DEPLOY_PRODUCTION' }}

    env:
      SAKURA_PROD_PATH: /home/gltr/www/gloria-site
      SAKURA_BACKUP_BASE: /home/gltr/www/_backups

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate branch and confirmation
        run: |
          echo "Deploy source ref: $GITHUB_REF"
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "This workflow deploys only refs/heads/main. Select the main branch when running it manually."
            exit 1
          fi
          if [ "${{ inputs.confirm }}" != "DEPLOY_PRODUCTION" ]; then
            echo "Confirmation text did not match. Deployment stopped."
            exit 1
          fi

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/sakura_deploy_key
          chmod 600 ~/.ssh/sakura_deploy_key
          ssh-keyscan -p "${{ secrets.SAKURA_PORT || '22' }}" -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current production site
        run: |
          TS="$(date +%Y%m%d-%H%M%S)"
          echo "BACKUP_TS=$TS" >> "$GITHUB_ENV"
          ssh \
            -i ~/.ssh/sakura_deploy_key \
            -p "${{ secrets.SAKURA_PORT || '22' }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "set -e; test -d '$SAKURA_PROD_PATH'; mkdir -p '$SAKURA_BACKUP_BASE'; tar -C '$SAKURA_PROD_PATH' -czf '$SAKURA_BACKUP_BASE/gloria-site-before-$TS.tar.gz' .; ls -lh '$SAKURA_BACKUP_BASE/gloria-site-before-$TS.tar.gz'"

      - name: Deploy main to production by rsync
        run: |
          rsync -azv \
            --human-readable \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='node_modules/' \
            --exclude='netlify.toml' \
            --exclude='*.zip' \
            --exclude='admin/password.txt' \
            --exclude='admin/.htpasswd' \
            -e "ssh -i ~/.ssh/sakura_deploy_key -p ${{ secrets.SAKURA_PORT || '22' }} -o StrictHostKeyChecking=yes" \
            ./ \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:$SAKURA_PROD_PATH/"

      - name: Keep legacy root vehicles.json in sync
        run: |
          ssh \
            -i ~/.ssh/sakura_deploy_key \
            -p "${{ secrets.SAKURA_PORT || '22' }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "set -e; cp '$SAKURA_PROD_PATH/frontend/data/vehicles.json' '$SAKURA_PROD_PATH/vehicles.json'; test -s '$SAKURA_PROD_PATH/vehicles.json'"

      - name: Publish root symlinks for Sakura
        run: |
          ssh \
            -i ~/.ssh/sakura_deploy_key \
            -p "${{ secrets.SAKURA_PORT || '22' }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "bash '$SAKURA_PROD_PATH/scripts/sakura-publish-links.sh' '$SAKURA_PROD_PATH'"

      - name: Smoke test production pages
        run: |
          set -e
          sleep 3
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/catalog.html"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/west-africa/ghana"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/west-africa/cote-divoire"
          curl -sI --fail --max-time 20 "https://www.gloriatrading.com/west-africa/ivory-coast" | grep -i "^Location:" | grep -q "/west-africa/cote-divoire"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/ghana.html"
          curl -sI --fail --max-time 20 "https://www.gloriatrading.com/ghana.html" | grep -i "^Location:" | grep -q "/west-africa/ghana"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/vehicle-detail.html?ref=REF-019"
          curl -I --fail --max-time 20 "https://www.gloriatrading.com/images/vehicles/REF-019-1.jpg"
