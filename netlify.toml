[build]
  command = "rm -rf netlify_publish && mkdir -p netlify_publish && tar --exclude='./netlify_publish' --exclude='./.git' --exclude='./.github' --exclude='./admin' --exclude='*.php' -cf - . | tar -xf - -C netlify_publish"
  publish = "netlify_publish"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/vehicles.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/images/vehicles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
